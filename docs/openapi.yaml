    put:
      tags: [Billing]
      summary: Pause an ACTIVE cycle
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400":
          description: Cycle is not ACTIVE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/billing/{id}/resume:
    put:
      tags: [Billing]
      summary: Resume a PAUSED cycle
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                nextBillingDate:
                  type: string
                  format: date-time
                  description: Optional override. If omitted, next_billing_date is recomputed from cycle_type + billing_day.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400":
          description: Cycle is not PAUSED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/billing/issue-key:
    post:
      tags: [Billing]
      summary: Issue a Toss billing key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerKey, authKey]
              properties:
                customerKey: { type: string }
                authKey: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/billing/create:
    post:
      tags: [Billing]
      summary: Create a new billing cycle (execute first recurring charge)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerKey, billingKey, cycleType, billingDay, amount, orderName]
              properties:
                customerKey: { type: string }
                billingKey: { type: string }
                cycleType:
                  type: string
                  enum: [MONTHLY, YEARLY]
                billingDay: { type: integer, minimum: 1, maximum: 28 }
                amount: { type: number }
                orderName: { type: string }
                promotionCode: { type: string, nullable: true }
      responses:
        "201":
          description: Billing cycle created and first payment executed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          billingCycle: { $ref: "#/components/schemas/BillingCycle" }
                          firstPayment: { $ref: "#/components/schemas/PaymentRecord" }
                          membershipProcessed: { type: boolean }
                          promotion:
                            type: object
                            nullable: true
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/billing/process/pending:
