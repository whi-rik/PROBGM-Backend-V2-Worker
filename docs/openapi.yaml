  /api/payments/confirm:
    post:
      tags: [Payments]
      summary: Confirm a one-time Toss payment (no auth — callable from FE after redirect)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentKey, orderId, amount]
              properties:
                paymentKey: { type: string }
                orderId: { type: string }
                amount: { type: number }
      responses:
        "200":
          description: Confirmed; DB updated and membership applied if order_name matches a plan
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/PaymentRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/payments/webhook:
    post:
      tags: [Payments]
      summary: Toss webhook endpoint (idempotent)
      description: |
        The handler refuses requests with HTTP 503 when `APP_ENV != development`
        and `TOSS_WEBHOOK_SECRET` is not configured. When configured, the
        signature is verified via HMAC-SHA256.

        Idempotency: dedupes by `webhook_id` against
        `PAYMENT_WEBHOOK_AUDIT_TABLE`. If no `id` is present on the payload,
        the Worker derives a stable id from `sha256(rawBody)`. Replays return
        `idempotent: true` without re-running state mutations.
      security: []
      parameters:
        - in: header
          name: x-toss-signature
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TossWebhookRequest" }
      responses:
        "200":
          description: Webhook processed (possibly idempotent replay)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/TossWebhookResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Signature present but does not verify
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }
        "503":
          description: Webhook secret is required in this environment but was not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }

