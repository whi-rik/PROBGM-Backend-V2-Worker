  # ========================== Redeem ==========================
  /api/redeem:
    post:
      tags: [Redeem]
      summary: Use a redeem code
      description: |
        Atomically locks the code row (FOR UPDATE), validates it, writes a
        usage row, increments current_uses, and grants the declared rewards:
          - membership (UPSERT into users_membership with GREATEST semantics)
          - credits (add to users_balance.bonus_credits with expiry)
          - download_points (add to users_balance.bonus_download_points with expiry)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Normalized to uppercase internally.
      responses:
        "200":
          description: Code consumed; rewards applied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/RedeemGrantResult" }
        "400":
          description: Code invalid / expired / already used by this user / usage limit reached
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500":
          description: Code was consumed but reward grant failed (manual fix required — check logs)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }

  /api/redeem/check/{code}:
    get:
      tags: [Redeem]
      summary: Validate a redeem code without consuming it (public)
      security: []
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        "200":
          description: |
            `valid` is always boolean. `data` is populated when valid=true.
            Rate limiting is intentionally NOT applied inside the Worker;
            attach via Cloudflare WAF / Rate Limiting Rules at the edge.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  valid: { type: boolean }
                  message: { type: string }
                  data: { $ref: "#/components/schemas/RedeemCodeCheckData" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/redeem/history:
    get:
      tags: [Redeem]
      summary: My redeem-code usage history
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

