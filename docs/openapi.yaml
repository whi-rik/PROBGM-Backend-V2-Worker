      summary: Cancel payment (full or partial)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancelReason]
              properties:
                cancelReason: { type: string }
                cancelAmount: { type: number, description: Omit for full cancel }
                refundReceiveAccount:
                  type: object
                  properties:
                    bank: { type: string }
                    accountNumber: { type: string }
                    holderName: { type: string }
      responses:
        "200":
          description: Cancellation recorded
          content:
