openapi: 3.0.3
info:
  title: PROBGM Backend V2 Worker
  version: 0.1.0
  description: |
    Cloudflare Workers-based backend for PROBGM. Contract-equivalent migration
    of `PROBGM-Backend-TS`. Endpoint paths, DB schema, and response envelope
    stay identical to the legacy Express backend; Workers-native concerns
    (runtime scheduling, R2 uploads, Hyperdrive DB) are isolated internally.

    Authentication: `Authorization: Bearer <ssid>` header. `ssid` is the
    session UUID stored in the `users_tokens` table. Cookie-based sessions
    are NOT supported.

    User routes are dual-mounted at both `/user/*` (FE V2 style) and
    `/api/user/*` (FE V1 + legacy contract). Each handler is reachable
    under both prefixes.

    Webhook idempotency: `POST /api/payments/webhook` deduplicates by
    `webhook_id` (falls back to SHA-256 of the raw body when `id` is
    missing). Duplicate deliveries return `idempotent: true`.

  license:
    name: Proprietary
  contact:
    name: PROBGM Team

servers:
  - url: http://localhost:8787
    description: Local wrangler dev
  - url: https://worker-staging.example.com
    description: Staging (replace with your Worker URL)
  - url: https://worker.example.com
    description: Production (replace with your Worker URL)

security:
  - bearerAuth: []

tags:
  - name: Health
    description: Runtime diagnostics and provider health.
  - name: Auth
    description: Local/social session lifecycle.
  - name: OTP
    description: Email OTP flows for register/login.
  - name: User
    description: Authenticated user info, balance, membership, channels, profile.
  - name: Discovery
    description: v3 asset/tag discovery.
  - name: Playlists
    description: Playlist CRUD and v2 features (reorder/like/popular/duplicate).
  - name: Downloads
    description: Download listing and point-gated download handoff.
  - name: Promotion
    description: Promotion code check/history/stats (amount discount at checkout).
  - name: Redeem
    description: Redeem code use/check/history/stats (grants membership/credits/download points).
  - name: Upload
    description: R2-backed file upload.
  - name: Billing
    description: Recurring billing cycles (pause/resume/cancel + manual triggers).
  - name: Payments
    description: Toss payment confirm/cancel/history and webhook.
  - name: Admin
    description: Admin dashboard, channel verification, payment inspection.
  - name: V2 Admin
    description: Label CRUD, pending-grant retry.
  - name: Sync
    description: Typesense sync/consistency operations.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ssid (UUID stored in users_tokens.token)

  schemas:
    # -- Envelope ----------------------------------------------------------
    ApiResponse:
      type: object
      required: [success, data, message, statusCode]
      properties:
        success:
          type: boolean
          example: true
        data:
          description: Route-specific payload. See individual responses.
        message:
          type: string
          example: 요청이 성공적으로 처리되었습니다.
        statusCode:
          type: integer
          example: 200

    Failure:
      type: object
      required: [success, message, statusCode]
      properties:
        success:
          type: boolean
          example: false
        data:
          description: Always null on failure.
          type: object
          nullable: true
        message:
          type: string
        statusCode:
          type: integer
        code:
          type: string
        path:
          type: string
        method:
          type: string
        timestamp:
          type: string
          format: date-time

    # -- Domain entities ---------------------------------------------------
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email, nullable: true }
        provider:
          type: string
          enum: [local, google, facebook, kakao, otp]
        is_newbie: { type: boolean }
        created_at: { type: string, format: date-time, nullable: true }

    AuthSession:
      type: object
      properties:
        ssid: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/User" }

    Balance:
      type: object
      properties:
        balance: { type: integer }
        bonus_credits: { type: integer }
        bonus_credits_expires_at: { type: string, format: date-time, nullable: true }
        download_point: { type: integer }
        bonus_download_points: { type: integer }
        bonus_download_points_expires_at: { type: string, format: date-time, nullable: true }

    MembershipTier:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]
      description: "0=FREE, 1=BASIC, 2=PRO, 3=MASTER, 4=EDU, 5=DEV"

    Membership:
      type: object
      properties:
        tier: { $ref: "#/components/schemas/MembershipTier" }
        tier_name:
          type: string
          enum: [FREE, BASIC, PRO, MASTER, EDU, DEV]
        started_at: { type: string, format: date-time }
        renewal_interval_days: { type: integer }
        last_renewed_at: { type: string, format: date-time }
        is_active: { type: boolean }

    Channel:
      type: object
      properties:
        id: { type: string }
        channel_id: { type: string }
        name: { type: string, nullable: true }
        url: { type: string, nullable: true }
        is_verified: { type: boolean }
        auto_renewal: { type: boolean }
        is_expired: { type: boolean }
        verification_keyword: { type: string }
        reg_in: { type: string, format: date-time }

    PromotionCode:
      type: object
      properties:
        code: { type: string }
        discount_type: { type: string, enum: [FIXED_AMOUNT, PERCENTAGE] }
        discount_value: { type: number }
        applicable_plans:
          type: array
          items: { type: string }
          nullable: true
        description: { type: string, nullable: true }
        is_active: { type: integer }
        current_uses: { type: integer }
        max_uses: { type: integer, description: "-1 = unlimited" }
        expires_at: { type: string, format: date-time, nullable: true }

    RedeemRewardType:
      type: string
      enum: [membership, credits, download_points, combo]

    RedeemMembershipType:
      type: string
      enum: [basic, premium, pro, dev, edu]

    RedeemUsageInfo:
      type: object
      properties:
        current: { type: integer }
        max: { type: integer, description: "-1 = unlimited" }
        remaining:
          oneOf:
            - type: integer
            - type: string
              enum: [unlimited]

    RedeemCodeCheckData:
      type: object
      properties:
        rewardType: { $ref: "#/components/schemas/RedeemRewardType" }
        usage: { $ref: "#/components/schemas/RedeemUsageInfo" }
        expiresAt: { type: string, format: date-time, nullable: true }
        membership:
          type: object
          nullable: true
          properties:
            type: { $ref: "#/components/schemas/RedeemMembershipType" }
            durationDays: { type: integer }
        credits:
          type: object
          nullable: true
          properties:
            amount: { type: integer }
        downloadPoints:
          type: object
          nullable: true
          properties:
            amount: { type: integer }

    RedeemGrantResult:
      type: object
      properties:
        rewardType: { $ref: "#/components/schemas/RedeemRewardType" }
        membership:
          type: object
          nullable: true
          properties:
            type: { $ref: "#/components/schemas/RedeemMembershipType" }
            durationDays: { type: integer }
            endDate: { type: string, format: date-time }
        credits:
          type: object
          nullable: true
          properties:
            amount: { type: integer }
            expiresInDays: { type: integer }
        downloadPoints:
          type: object
          nullable: true
          properties:
            amount: { type: integer }
            expiresInDays: { type: integer }
        codeUsage: { $ref: "#/components/schemas/RedeemUsageInfo" }

    PaymentRecord:
      type: object
      properties:
        id: { type: integer }
        paymentKey: { type: string }
        orderId: { type: string }
        orderName: { type: string }
        amount: { type: number }
        currency: { type: string }
        method: { type: string, nullable: true }
        status:
          type: string
          enum: [READY, IN_PROGRESS, WAITING_FOR_DEPOSIT, DONE, CANCELED, PARTIAL_CANCELED, ABORTED, EXPIRED]
        userId: { type: string, format: uuid }
        customerKey: { type: string, nullable: true }
        billingKey: { type: string, nullable: true }
        isBilling: { type: boolean }
        billingCycle:
          type: string
          enum: [MONTHLY, YEARLY]
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PaymentCancellation:
      type: object
      properties:
        id: { type: integer }
        paymentId: { type: integer }
        paymentKey: { type: string }
        transactionKey: { type: string, nullable: true }
        cancelAmount: { type: number }
        cancelReason: { type: string, nullable: true }
        cancellationType: { type: string, enum: [FULL, PARTIAL] }
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, COMPLETED, FAILED]
        requestedBy: { type: string, format: uuid, nullable: true }
        approvedBy: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }

    BillingCycle:
      type: object
      properties:
        id: { type: integer }
        payment_id: { type: integer }
        user_id: { type: string, format: uuid }
        customer_key: { type: string }
        billing_key: { type: string }
        cycle_type: { type: string, enum: [MONTHLY, YEARLY] }
        billing_day: { type: integer }
        amount: { type: number }
        status:
          type: string
          enum: [ACTIVE, PAUSED, CANCELLED, EXPIRED]
        next_billing_date: { type: string, format: date-time, nullable: true }
        last_billing_date: { type: string, format: date-time, nullable: true }
        retry_count: { type: integer }
        max_retries: { type: integer }

    Playlist:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean }
        is_hide: { type: boolean }
        is_default: { type: boolean }
        created_in: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # -- Webhook -----------------------------------------------------------
    TossWebhookRequest:
      type: object
      required: [eventType, data]
      properties:
        id: { type: string, description: "Event id. When omitted, the Worker derives a stable id from sha256(rawBody)." }
        eventType:
          type: string
          enum: [PAYMENT_STATUS_CHANGED, PAYMENT_WEBHOOK, BILLING_DELETED]
        createdAt: { type: string, format: date-time }
        data:
          type: object
          properties:
            paymentKey: { type: string }
            orderId: { type: string }
            billingKey: { type: string }
            customerKey: { type: string }
            status: { type: string }

    TossWebhookResult:
      type: object
      properties:
        action: { type: string }
        eventType: { type: string }
        paymentKey: { type: string, nullable: true }
        idempotent:
          type: boolean
          description: true when this delivery matched a previously processed webhook_id.
        webhookId: { type: string }

  responses:
    Success:
      description: Success
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiResponse" }
    Created:
      description: Created
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiResponse" }
    BadRequest:
      description: Validation or business-rule failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    Unauthorized:
      description: Missing or invalid session
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    Forbidden:
      description: Session is valid but lacks required role (usually admin)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    NotFound:
      description: Target resource does not exist
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    Conflict:
      description: Idempotent replay or duplicate
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }
    ServiceUnavailable:
      description: Runtime guard blocked the request (e.g. missing webhook secret in staging/production)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Failure" }

paths:
  # ========================== Health ==========================
  /:
    get:
      tags: [Health]
      summary: Worker root
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /health:
    get:
      tags: [Health]
      summary: Runtime and binding summary
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /health/db:
    get:
      tags: [Health]
      summary: DB provider ping
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /health/storage:
    get:
      tags: [Health]
      summary: R2 binding readiness
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /health/schema:
    get:
      tags: [Health]
      summary: Optional-table readiness report (upload_metadata, webhook_audit)
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /health/jobs:
    get:
      tags: [Health]
      summary: Scheduled-job runtime summary
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  # ========================== Auth ==========================
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Local or social account registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                provider:
                  type: string
                  enum: [local, google, facebook, kakao]
                social_id: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/verify:
    post:
      tags: [Auth]
      summary: Identify + mint a session (social verify / local verify)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                identifier:
                  type: string
                  description: "Email for local, social id for social providers."
                credential: { type: string }
                provider:
                  type: string
                  enum: [local, google, facebook, kakao]
      responses:
        "200":
          description: Session issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AuthSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404":
          description: Social user not found (SOCIAL_USER_NOT_FOUND)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Local email/password login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/social/callback:
    post:
      tags: [Auth]
      summary: Social callback with optional auto-register (Worker-specific)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [google, facebook, kakao]
                social_id: { type: string }
                email: { type: string, format: email }
                username: { type: string }
                autoRegister: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/isLogged:
    get:
      tags: [Auth]
      summary: Whether the caller is logged in (no-throw; returns success:true/false)
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/auth/check:
    get:
      tags: [Auth]
      summary: Session validation
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/auth/signout:
    post:
      tags: [Auth]
      summary: Alias of /logout (legacy-compatible spelling)
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the current session
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/newbie/check:
    get:
      tags: [Auth]
      summary: Returns whether the user still needs onboarding
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/newbie/confirm:
    post:
      tags: [Auth]
      summary: Mark onboarding complete
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---- OTP ----
  /api/auth/otp/check-email:
    post:
      tags: [OTP]
      summary: Check email availability before OTP register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/auth/otp/register/request:
    post:
      tags: [OTP]
      summary: Request OTP for registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                username: { type: string }
      responses:
        "200":
          description: In development, the response `data` includes `otpCode` (emailer is not wired on the Worker yet).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiResponse" }

  /api/auth/otp/register/verify:
    post:
      tags: [OTP]
      summary: Verify OTP and complete registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string }
                code: { type: string }
                username: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/otp/login/request:
    post:
      tags: [OTP]
      summary: Request OTP for login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  /api/auth/otp/login/verify:
    post:
      tags: [OTP]
      summary: Verify OTP and issue session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string }
                code: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/otp/resend:
    post:
      tags: [OTP]
      summary: Resend the most recent OTP (cooldown enforced)
      security: []
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "429":
          description: Resend cooldown still active
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Failure" }

  /api/auth/otp/verify:
    post:
      tags: [OTP]
      summary: Verify OTP without context (standalone check)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string }
                code: { type: string }
      responses:
        "200": { $ref: "#/components/responses/Success" }

  # ========================== User ==========================
  # Handlers are registered once in src/routes/user.ts and dual-mounted at
  # both "" (FE V2) and /api (FE V1 + legacy contract). The spec documents
  # one canonical path; the alternate form is identical.

  /user/info:
    get:
      tags: [User]
      summary: Current user profile summary
      description: Also reachable at `GET /api/user/info`.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/balance:
    get:
      tags: [User]
      summary: Current balance (membership + bonus)
      description: Also at `GET /api/user/balance`.
      responses:
        "200":
          description: ApiResponse envelope with data shaped like `Balance`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Balance" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/credits:
    get:
      tags: [User]
      summary: Credits subset of balance. Also at /api/user/credits.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/downloadPoint:
    get:
      tags: [User]
      summary: Download points subset of balance. Also at /api/user/downloadPoint.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/membership:
    get:
      tags: [User]
      summary: Active membership. Also at /api/user/membership.
      responses:
        "200":
          description: ApiResponse envelope with data shaped like `Membership`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Membership" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/label:
    get:
      tags: [User]
      summary: Current user label (read-only; writes are on legacy labelRoutes).
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/stats:
    get:
      tags: [User]
      summary: Aggregated user stats. Also at /api/user/stats.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/profile:
    get:
      tags: [User]
      summary: Extended profile read. Also at /api/user/profile.
      responses:
        "200": { $ref: "#/components/responses/Success" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /user/username:
    put:
      tags: [User]
      summary: Update username. Also at /api/user/username.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
